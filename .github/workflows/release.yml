name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-latest
            build_script: build:macos
            artifact_glob: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - platform: macos-x64
            runner: macos-15-intel
            build_script: build:macos
            artifact_glob: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - platform: windows
            runner: windows-2022
            build_script: build:windows
            artifact_glob: desktop/src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            desktop/package.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install service dependencies
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install --ignore-scripts

      - name: Build desktop app
        working-directory: desktop
        shell: bash
        run: |
          set -o pipefail
          npm run ${{ matrix.build_script }} 2>&1 | tee ../desktop-build-${{ matrix.platform }}.log

      - name: Report build failure
        if: failure()
        shell: bash
        run: |
          log_file="desktop-build-${{ matrix.platform }}.log"
          if [ -f "$log_file" ]; then
            tail -n 120 "$log_file"
            summary="$(grep -iE 'error|failed|cannot|could not|not found|denied|panic|exception' "$log_file" | tail -n 40)"
            if [ -z "$summary" ]; then
              summary="$(tail -n 25 "$log_file")"
            fi
            escaped_summary="$(printf '%s' "$summary" | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=${{ matrix.platform }} desktop build failed::$escaped_summary"
          fi

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: airouter-${{ matrix.platform }}-build-log
          path: desktop-build-${{ matrix.platform }}.log
          if-no-files-found: ignore

      - name: Normalize Windows installer name
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./desktop/src-tauri/tauri.conf.json').version")"
          installer_dir="desktop/src-tauri/target/release/bundle/nsis"
          installers=("$installer_dir"/*.exe)
          if [ "${#installers[@]}" -ne 1 ]; then
            printf 'Expected exactly one Windows installer, found %s\n' "${#installers[@]}" >&2
            printf '%s\n' "${installers[@]}" >&2
            exit 1
          fi
          mv "${installers[0]}" "$installer_dir/Airouter_${version}_x64-setup.exe"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: airouter-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          exec > >(tee release-publish.log) 2>&1
          find release-assets -type f -maxdepth 2 -print
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --title "$TAG_NAME" --generate-notes
          fi

      - name: Report release failure
        if: failure()
        shell: bash
        run: |
          if [ -f release-publish.log ]; then
            tail -n 80 release-publish.log
            escaped_tail="$(tail -n 40 release-publish.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=release publish failed::$escaped_tail"
          fi
