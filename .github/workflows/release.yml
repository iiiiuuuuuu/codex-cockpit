name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
            build_script: build:macos
            artifact_glob: desktop/src-tauri/target/release/bundle/macos/*.zip
          - platform: windows
            runner: windows-latest
            build_script: build:windows
            artifact_glob: desktop/src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build desktop app
        working-directory: desktop
        run: npm run ${{ matrix.build_script }}

      - name: Zip macOS app
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          cd desktop/src-tauri/target/release/bundle/macos
          ditto -c -k --sequesterRsrc --keepParent Airouter.app "Airouter_${GITHUB_REF_NAME}_${RUNNER_ARCH}.app.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: airouter-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --title "$TAG_NAME" --generate-notes
          fi
