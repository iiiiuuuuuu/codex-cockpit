<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airouter</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="boot-shell" aria-live="polite">
      <section class="boot-panel" data-state="loading" id="bootPanel">
        <div class="brand-row">
          <span class="mark" aria-hidden="true"></span>
          <span class="brand">Airouter</span>
        </div>
        <div class="copy">
          <p class="eyebrow">正在打开配置页</p>
          <h1 id="headline">启动本地服务</h1>
          <p id="message">服务就绪后会直接进入管理配置页面。</p>
        </div>
        <form class="setup-form" id="setupForm" hidden>
          <div class="field-row">
            <label for="servicePortInput">服务端口</label>
            <input id="servicePortInput" type="number" min="1" max="65535" inputmode="numeric" value="3009" />
          </div>
          <label class="check-row">
            <input id="proxyEnabledInput" type="checkbox" checked />
            <span>启用本地代理端口</span>
          </label>
          <div class="field-row">
            <label for="proxyPortInput">代理端口</label>
            <input id="proxyPortInput" type="number" min="1" max="65535" inputmode="numeric" value="7890" />
          </div>
          <label class="check-row">
            <input id="apikeyEnabledInput" type="checkbox" />
            <span>生成入口 apikey</span>
          </label>
          <button class="primary" id="setupSubmitBtn" type="submit">保存配置并启动</button>
        </form>
        <div class="progress" id="progress" aria-hidden="true"><span></span></div>
        <div class="actions" id="actions" hidden>
          <button class="primary" id="retryBtn" type="button">重新进入配置页</button>
          <button id="logBtn" type="button">查看最近日志</button>
          <button id="revealBtn" type="button">打开运行目录</button>
        </div>
        <pre id="logOutput" hidden></pre>
      </section>
    </main>
    <script src="./src/main.js"></script>
  </body>
</html>
